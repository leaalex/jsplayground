services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
    depends_on:
      - frontend

  frontend:
    build: .
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - DB_PATH=/data/playground.db
      - PORT=3000
    volumes:
      - ./data:/data
    restart: unless-stopped

volumes:
  caddy-data:
